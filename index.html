<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AhoyVR Forums</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>
<link rel="icon" src="https://raw.githubusercontent.com/zacherybbrown/ahoyvr.online/refs/heads/main/icon.png">

<h3>AhoyVR Forums</h3>

<div id="authBox">
    <h1>Login / Signup</h1>

    <input type="email" id="email" placeholder="Email">
    <br><br>

    <input type="password" id="password" placeholder="Password">
    <br><br>

    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>

    <p id="authStatus"></p>
</div>

<hr>

<div id="forumBox" style="display:none;">

    <h1>Create Post</h1>

    <input type="text" id="postTitle" placeholder="Post title">
    <br><br>

    <textarea id="postContent" placeholder="Write something..." rows="6" cols="40"></textarea>

    <br><br>

    <button onclick="createPost()">Post</button>

    <hr>

    <h1>Forum Posts</h1>

    <div id="posts"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://udrdowlpdakrmuydpnua.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkcmRvd2xwZGFrcm11eWRwbnVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyMDI5NDksImV4cCI6MjA5Mzc3ODk0OX0.qKZcVhDmE7Kt5wUk5fij-gJbdhdmlCi42U8QNmnhu2c"

const supabase = createClient(
    SUPABASE_URL,
    SUPABASE_KEY
)

const authBox = document.getElementById("authBox")
const forumBox = document.getElementById("forumBox")
const postsDiv = document.getElementById("posts")

// ========================
// SIGNUP
// ========================

window.signup = async function () {

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const { error } = await supabase.auth.signUp({
        email,
        password
    })

    if (error) {
        document.getElementById("authStatus").innerText = error.message
    } else {
        document.getElementById("authStatus").innerText =
            "Signup successful! Check your email."
    }
}

// ========================
// LOGIN
// ========================

window.login = async function () {

    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    const { error } = await supabase.auth.signInWithPassword({
        email,
        password
    })

    if (error) {
        document.getElementById("authStatus").innerText = error.message
    } else {
        document.getElementById("authStatus").innerText = "Logged in!"
        showForum()
    }
}

// ========================
// SHOW FORUM
// ========================

async function showForum() {

    forumBox.style.display = "block"

    loadPosts()
}

// ========================
// CREATE POST
// ========================

window.createPost = async function () {

    const title = document.getElementById("postTitle").value.trim()
    const content = document.getElementById("postContent").value.trim()

    if (!title || !content) {
        alert("Fill everything out")
        return
    }

    const {
        data: { user }
    } = await supabase.auth.getUser()

    if (!user) {
        alert("Login first")
        return
    }

    const { error } = await supabase
        .from("posts")
        .insert([
            {
                title,
                content,
                author: user.email,
                user_id: user.id
            }
        ])

    if (error) {
        alert(error.message)
    } else {

        document.getElementById("postTitle").value = ""
        document.getElementById("postContent").value = ""

        loadPosts()
    }
}

// ========================
// LOAD POSTS
// ========================

async function loadPosts() {

    const { data, error } = await supabase
        .from("posts")
        .select("*")
        .order("created_at", { ascending: false })

    postsDiv.innerHTML = ""

    if (error) {
        postsDiv.innerHTML = "Failed to load posts"
        return
    }

    data.forEach(post => {

        const div = document.createElement("div")

        div.style.border = "1px solid #a5e7e4"
        div.style.padding = "20px"
        div.style.margin = "20px"
        div.style.borderRadius = "10px"
        div.style.background = "#102d4e"

        div.innerHTML = `
            <h2>${escapeHTML(post.title)}</h2>
            <p>${escapeHTML(post.content)}</p>
            <small>
                Posted by ${escapeHTML(post.author)}
            </small>
        `

        postsDiv.appendChild(div)
    })
}

// ========================
// REALTIME POSTS
// ========================

supabase
    .channel('posts-channel')
    .on(
        'postgres_changes',
        {
            event: '*',
            schema: 'public',
            table: 'posts'
        },
        payload => {
            loadPosts()
        }
    )
    .subscribe()

// ========================
// AUTO LOGIN
// ========================

supabase.auth.getSession().then(({ data: { session } }) => {

    if (session) {
        showForum()
    }
})

// ========================
// ESCAPE HTML
// ========================

function escapeHTML(str) {

    return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
}

</script>

</body>
</html>
