<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AhoyVR! - Forums</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e0e0e0;
      --muted: #666;
      --accent: #4ade80;
      --danger: #f87171;
      --font: 'Courier New', Courier, monospace;
      --radius: 2px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    button, input, textarea, select {
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
    }
    input, textarea, select { padding: 6px 10px; width: 100%; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 100px; }

    button {
      padding: 6px 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.primary { border-color: var(--accent); color: var(--accent); }
    button.danger  { border-color: var(--danger); color: var(--danger); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Layout ────────────────────────────────────────────────── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header .brand { font-size: 16px; color: var(--accent); letter-spacing: 2px; }
    header nav { display: flex; gap: 14px; flex: 1; }
    header .auth-area { display: flex; gap: 10px; align-items: center; }

    #app {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── Panels (views) ────────────────────────────────────────── */
    .panel { display: none; }
    .panel.active { display: block; }

    h2 { font-size: 14px; margin-bottom: 16px; letter-spacing: 1px; color: var(--muted); text-transform: uppercase; }

    /* ── Tables ────────────────────────────────────────────────── */
    .list-item {
      border: 1px solid var(--border);
      padding: 12px 14px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .list-item:hover { border-color: var(--accent); }
    .list-item .main { flex: 1; min-width: 0; }
    .list-item .meta { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .list-item .title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { background: var(--surface); border: 1px solid var(--border); padding: 1px 6px; font-size: 11px; margin-left: 4px; }
    .tag { background: var(--surface); border: 1px solid var(--border); padding: 1px 5px; font-size: 11px; margin-right: 4px; }
    .pinned { color: var(--accent); font-size: 11px; margin-right: 6px; }
    .locked { color: var(--muted); font-size: 11px; margin-right: 6px; }

    /* ── Thread / Post body ────────────────────────────────────── */
    .post-box {
      border: 1px solid var(--border);
      margin-bottom: 10px;
      padding: 14px;
    }
    .post-box .post-header {
      display: flex; gap: 10px; align-items: baseline;
      margin-bottom: 8px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .post-box .author { color: var(--accent); }
    .post-box .post-date { color: var(--muted); font-size: 12px; }
    .post-box .post-body { white-space: pre-wrap; word-break: break-word; }
    .post-box .post-actions { margin-top: 10px; display: flex; gap: 8px; font-size: 12px; }

    /* ── Forms ─────────────────────────────────────────────────── */
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; color: var(--muted); margin-bottom: 4px; font-size: 12px; }
    .form-row { display: flex; gap: 10px; }
    .form-row button { white-space: nowrap; }

    /* ── Misc ──────────────────────────────────────────────────── */
    .notice { padding: 10px; border: 1px solid var(--border); color: var(--muted); margin-bottom: 12px; }
    .notice.error { border-color: var(--danger); color: var(--danger); }
    .notice.success { border-color: var(--accent); color: var(--accent); }
    .sep { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .load-more { text-align: center; margin-top: 12px; }
    .spinner { color: var(--muted); padding: 20px; text-align: center; }
  </style>
</head>
<body>

<header>
  <span class="brand">[ FORUMS ]</span>
  <nav>
    <a href="#" onclick="showPanel('home')">Home</a>
    <a href="#" onclick="showPanel('search-panel')">Search</a>
  </nav>
  <div class="auth-area" id="auth-area">
    <span id="user-label" style="color:var(--muted);font-size:12px"></span>
    <button id="btn-login" onclick="showPanel('login')">Login</button>
    <button id="btn-register" onclick="showPanel('register')">Register</button>
    <button id="btn-logout" style="display:none" onclick="logout()">Logout</button>
  </div>
</header>

<div id="app">

  <!-- ── Home / Category list ── -->
  <div id="home" class="panel active">
    <h2>Categories</h2>
    <div id="category-list"><div class="spinner">loading...</div></div>
  </div>

  <!-- ── Thread list ── -->
  <div id="thread-list-panel" class="panel">
    <h2 id="thread-list-title">Threads</h2>
    <div style="margin-bottom:12px">
      <button class="primary" onclick="showPanel('new-thread')">+ New Thread</button>
      <select id="sort-select" style="width:auto;margin-left:8px" onchange="loadThreads()">
        <option value="lastActivity">Recent Activity</option>
        <option value="createdAt">Newest</option>
        <option value="replyCount">Most Replies</option>
        <option value="viewCount">Most Viewed</option>
      </select>
    </div>
    <div id="thread-list"></div>
    <div class="load-more" id="thread-more" style="display:none">
      <button onclick="loadMoreThreads()">Load more</button>
    </div>
  </div>

  <!-- ── Thread view ── -->
  <div id="thread-view" class="panel">
    <div style="margin-bottom:10px">
      <a href="#" onclick="showPanel('thread-list-panel')">← Back</a>
    </div>
    <div id="thread-header"></div>
    <hr class="sep" />
    <div id="post-list"></div>
    <div class="load-more" id="post-more" style="display:none">
      <button onclick="loadMorePosts()">Load more</button>
    </div>
    <hr class="sep" />
    <div id="reply-box"></div>
  </div>

  <!-- ── New thread ── -->
  <div id="new-thread" class="panel">
    <h2>New Thread</h2>
    <div id="new-thread-msg"></div>
    <div class="form-group">
      <label>Title</label>
      <input id="nt-title" type="text" placeholder="Thread title" />
    </div>
    <div class="form-group">
      <label>Body</label>
      <textarea id="nt-body" rows="8" placeholder="Write your post..."></textarea>
    </div>
    <div class="form-group">
      <label>Tags (comma-separated, max 5)</label>
      <input id="nt-tags" type="text" placeholder="tag1, tag2" />
    </div>
    <div class="form-row">
      <button class="primary" onclick="submitThread()">Post Thread</button>
      <button onclick="showPanel('thread-list-panel')">Cancel</button>
    </div>
  </div>

  <!-- ── Login ── -->
  <div id="login" class="panel">
    <h2>Login</h2>
    <div id="login-msg"></div>
    <div class="form-group"><label>Email</label><input id="login-email" type="email" /></div>
    <div class="form-group"><label>Password</label><input id="login-pass" type="password" /></div>
    <div class="form-row">
      <button class="primary" onclick="doLogin()">Login</button>
      <button onclick="showPanel('home')">Cancel</button>
    </div>
  </div>

  <!-- ── Register ── -->
  <div id="register" class="panel">
    <h2>Register</h2>
    <div id="reg-msg"></div>
    <div class="form-group"><label>Email</label><input id="reg-email" type="email" /></div>
    <div class="form-group"><label>Password</label><input id="reg-pass" type="password" /></div>
    <div class="form-group"><label>Display Name</label><input id="reg-name" type="text" /></div>
    <div class="form-row">
      <button class="primary" onclick="doRegister()">Register</button>
      <button onclick="showPanel('home')">Cancel</button>
    </div>
  </div>

  <!-- ── Search ── -->
  <div id="search-panel" class="panel">
    <h2>Search</h2>
    <div class="form-row" style="margin-bottom:12px">
      <input id="search-input" type="text" placeholder="Search threads..." onkeydown="if(event.key==='Enter')doSearch()" />
      <button class="primary" onclick="doSearch()">Search</button>
    </div>
    <div id="search-results"></div>
  </div>

</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG — Replace these with your Firebase project values
// ══════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCWIPszvGc8AUu86xY8AEX-h1iNBD1b2Qk",
  authDomain:        "ahoyvrforums.firebaseapp.com",
  projectId:         "ahoyvrforums",
  storageBucket:     "ahoyvrforums.appspot.com",
  messagingSenderId: "250731807621",
  appId:             "1:250731807621:web:0c337e98640a6c3c8cbaec",
};

// Your deployed Cloud Function API URL
const API_BASE = "https://us-central1-ahoyvrforums.cloudfunctions.net/api";
// ══════════════════════════════════════════════════════════════════

firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();

// ── State ────────────────────────────────────────────────────────
let currentUser    = null;
let currentCatId   = null;
let currentCatName = "";
let currentThreadId = null;
let threadCursor   = null;
let postCursor     = null;

// ── API helper ────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
  if (currentUser) {
    const token = await currentUser.getIdToken();
    headers["Authorization"] = `Bearer ${token}`;
  }
  const res = await fetch(API_BASE + path, { ...opts, headers });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Request failed");
  return data;
}

// ── Auth ──────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
  currentUser = user;
  document.getElementById("user-label").textContent = user ? user.email : "";
  document.getElementById("btn-login").style.display    = user ? "none" : "";
  document.getElementById("btn-register").style.display = user ? "none" : "";
  document.getElementById("btn-logout").style.display   = user ? "" : "none";
  if (user) refreshReplyBox();
});

async function doLogin() {
  const email = document.getElementById("login-email").value;
  const pass  = document.getElementById("login-pass").value;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    setMsg("login-msg", "Logged in!", "success");
    setTimeout(() => showPanel("home"), 800);
  } catch (e) { setMsg("login-msg", e.message, "error"); }
}

async function doRegister() {
  const email = document.getElementById("reg-email").value;
  const pass  = document.getElementById("reg-pass").value;
  const name  = document.getElementById("reg-name").value.trim();
  if (!name) return setMsg("reg-msg", "Display name is required.", "error");
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await api("/users/profile", {
      method: "POST",
      body: JSON.stringify({ displayName: name, bio: "", avatarUrl: "" }),
    });
    setMsg("reg-msg", "Account created!", "success");
    setTimeout(() => showPanel("home"), 800);
  } catch (e) { setMsg("reg-msg", e.message, "error"); }
}

function logout() {
  auth.signOut();
  showPanel("home");
}

// ── Views ─────────────────────────────────────────────────────────
function showPanel(id) {
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  const el = document.getElementById(id);
  if (el) el.classList.add("active");
  if (id === "home") loadCategories();
  if (id === "thread-list-panel") loadThreads(true);
  if (id === "new-thread") {
    if (!currentUser) { showPanel("login"); return; }
    document.getElementById("new-thread-msg").textContent = "";
  }
}

// ── Categories ────────────────────────────────────────────────────
async function loadCategories() {
  const el = document.getElementById("category-list");
  el.innerHTML = '<div class="spinner">loading...</div>';
  try {
    const cats = await api("/categories");
    if (!cats.length) { el.innerHTML = '<div class="notice">No categories yet.</div>'; return; }
    el.innerHTML = cats.map(c => `
      <div class="list-item" style="cursor:pointer" onclick="openCategory('${c.id}','${esc(c.name)}')">
        <span style="color:${c.color || '#4ade80'};margin-right:6px">■</span>
        <div class="main">
          <div class="title">${esc(c.name)}</div>
          <div style="color:var(--muted);font-size:12px">${esc(c.description || "")}</div>
        </div>
        <div class="meta">${c.threadCount || 0}t / ${c.postCount || 0}p</div>
      </div>`).join("");
  } catch (e) { el.innerHTML = `<div class="notice error">${e.message}</div>`; }
}

function openCategory(id, name) {
  currentCatId   = id;
  currentCatName = name;
  threadCursor   = null;
  document.getElementById("thread-list-title").textContent = name;
  showPanel("thread-list-panel");
}

// ── Threads ───────────────────────────────────────────────────────
async function loadThreads(reset = true) {
  if (reset) threadCursor = null;
  const el = document.getElementById("thread-list");
  if (reset) el.innerHTML = '<div class="spinner">loading...</div>';
  const sort = document.getElementById("sort-select").value;
  try {
    let path = `/threads?sort=${sort}&limit=25`;
    if (currentCatId) path += `&categoryId=${currentCatId}`;
    if (threadCursor)  path += `&after=${threadCursor}`;
    const { threads, hasMore, nextCursor } = await api(path);
    if (reset) el.innerHTML = "";
    if (!threads.length && reset) { el.innerHTML = '<div class="notice">No threads yet.</div>'; return; }
    el.innerHTML += threads.map(t => `
      <div class="list-item" style="cursor:pointer" onclick="openThread('${t.id}')">
        <div class="main">
          ${t.pinned ? '<span class="pinned">[pinned]</span>' : ""}
          ${t.locked ? '<span class="locked">[locked]</span>' : ""}
          <span class="title">${esc(t.title)}</span>
          ${(t.tags || []).map(tag => `<span class="tag">${esc(tag)}</span>`).join("")}
          <div style="color:var(--muted);font-size:12px;margin-top:2px">
            by ${esc(t.author?.displayName || "?")} · ${relTime(t.createdAt)}
          </div>
        </div>
        <div class="meta">${t.replyCount || 0} replies · ${t.viewCount || 0} views</div>
      </div>`).join("");
    threadCursor = nextCursor;
    document.getElementById("thread-more").style.display = hasMore ? "" : "none";
  } catch (e) { el.innerHTML = `<div class="notice error">${e.message}</div>`; }
}

function loadMoreThreads() { loadThreads(false); }

// ── Single Thread ─────────────────────────────────────────────────
async function openThread(id) {
  currentThreadId = id;
  postCursor = null;
  showPanel("thread-view");
  document.getElementById("thread-header").innerHTML = '<div class="spinner">loading...</div>';
  document.getElementById("post-list").innerHTML = "";
  try {
    const thread = await api(`/threads/${id}`);
    document.getElementById("thread-header").innerHTML = `
      <h2 style="text-transform:none;color:var(--text);font-size:16px;margin-bottom:8px">${esc(thread.title)}</h2>
      <div style="color:var(--muted);font-size:12px;margin-bottom:12px">
        in <strong>${esc(thread.categoryName)}</strong> ·
        by <strong>${esc(thread.author?.displayName || "?")}</strong> ·
        ${relTime(thread.createdAt)}
        ${thread.locked ? '· <span style="color:var(--muted)">[locked]</span>' : ""}
      </div>
      <div class="post-box">
        <div class="post-body">${esc(thread.body)}</div>
      </div>`;
    await loadPosts(true);
    refreshReplyBox(thread);
  } catch (e) {
    document.getElementById("thread-header").innerHTML = `<div class="notice error">${e.message}</div>`;
  }
}

async function loadPosts(reset = true) {
  if (reset) postCursor = null;
  const el = document.getElementById("post-list");
  try {
    let path = `/threads/${currentThreadId}/posts?limit=25`;
    if (postCursor) path += `&after=${postCursor}`;
    const { posts, hasMore, nextCursor } = await api(path);
    if (reset) el.innerHTML = "";
    el.innerHTML += posts.map(p => `
      <div class="post-box" id="post-${p.id}">
        <div class="post-header">
          <span class="author">${esc(p.author?.displayName || "?")}</span>
          <span class="post-date">${relTime(p.createdAt)}</span>
          ${p.editedAt ? '<span style="color:var(--muted);font-size:11px">(edited)</span>' : ""}
        </div>
        <div class="post-body">${esc(p.body)}</div>
        <div class="post-actions">
          <span style="color:var(--muted)">♥ ${p.likes || 0}</span>
          ${currentUser ? `<a href="#" onclick="likePost('${p.id}');return false">like</a>` : ""}
          ${currentUser && currentUser.uid === p.author?.uid
            ? `<a href="#" onclick="editPost('${p.id}');return false">edit</a>
               <a href="#" style="color:var(--danger)" onclick="deletePost('${p.id}');return false">delete</a>`
            : ""}
        </div>
      </div>`).join("");
    postCursor = nextCursor;
    document.getElementById("post-more").style.display = hasMore ? "" : "none";
  } catch (e) { el.innerHTML += `<div class="notice error">${e.message}</div>`; }
}

function loadMorePosts() { loadPosts(false); }

function refreshReplyBox(thread) {
  const el = document.getElementById("reply-box");
  if (!thread && !currentThreadId) { el.innerHTML = ""; return; }
  if (!currentUser) {
    el.innerHTML = '<div class="notice">Please <a href="#" onclick="showPanel(\'login\')">log in</a> to reply.</div>';
    return;
  }
  if (thread && thread.locked) {
    el.innerHTML = '<div class="notice">This thread is locked.</div>';
    return;
  }
  el.innerHTML = `
    <h2>Reply</h2>
    <div id="reply-msg"></div>
    <div class="form-group">
      <textarea id="reply-body" rows="5" placeholder="Write a reply..."></textarea>
    </div>
    <button class="primary" onclick="submitReply()">Post Reply</button>`;
}

async function submitReply() {
  const body = document.getElementById("reply-body").value.trim();
  if (!body) return;
  try {
    await api(`/threads/${currentThreadId}/posts`, {
      method: "POST",
      body: JSON.stringify({ body }),
    });
    document.getElementById("reply-body").value = "";
    await loadPosts(false);
  } catch (e) { setMsg("reply-msg", e.message, "error"); }
}

async function likePost(postId) {
  try { await api(`/threads/${currentThreadId}/posts/${postId}/like`, { method: "POST" }); loadPosts(false); }
  catch (e) { alert(e.message); }
}

async function deletePost(postId) {
  if (!confirm("Delete this post?")) return;
  try {
    await api(`/threads/${currentThreadId}/posts/${postId}`, { method: "DELETE" });
    loadPosts(false);
  } catch (e) { alert(e.message); }
}

async function editPost(postId) {
  const box = document.getElementById(`post-${postId}`).querySelector(".post-body");
  const current = box.textContent;
  const updated = prompt("Edit post:", current);
  if (!updated || updated === current) return;
  try {
    await api(`/threads/${currentThreadId}/posts/${postId}`, {
      method: "PATCH",
      body: JSON.stringify({ body: updated }),
    });
    loadPosts(false);
  } catch (e) { alert(e.message); }
}

// ── New Thread ────────────────────────────────────────────────────
async function submitThread() {
  const title = document.getElementById("nt-title").value.trim();
  const body  = document.getElementById("nt-body").value.trim();
  const tags  = document.getElementById("nt-tags").value
    .split(",").map(t => t.trim()).filter(Boolean).slice(0, 5);

  if (!title) return setMsg("new-thread-msg", "Title is required.", "error");
  if (!body)  return setMsg("new-thread-msg", "Body is required.", "error");
  if (!currentCatId) return setMsg("new-thread-msg", "No category selected. Go back and select one.", "error");

  try {
    const { id } = await api("/threads", {
      method: "POST",
      body: JSON.stringify({ title, body, categoryId: currentCatId, tags }),
    });
    document.getElementById("nt-title").value = "";
    document.getElementById("nt-body").value  = "";
    document.getElementById("nt-tags").value  = "";
    openThread(id);
  } catch (e) { setMsg("new-thread-msg", e.message, "error"); }
}

// ── Search ────────────────────────────────────────────────────────
async function doSearch() {
  const q = document.getElementById("search-input").value.trim();
  if (!q) return;
  const el = document.getElementById("search-results");
  el.innerHTML = '<div class="spinner">searching...</div>';
  try {
    const { results } = await api(`/search?q=${encodeURIComponent(q)}`);
    if (!results.length) { el.innerHTML = '<div class="notice">No results.</div>'; return; }
    el.innerHTML = results.map(t => `
      <div class="list-item" style="cursor:pointer" onclick="openThread('${t.id}')">
        <div class="main">
          <div class="title">${esc(t.title)}</div>
          <div style="color:var(--muted);font-size:12px">${esc(t.categoryName)} · ${relTime(t.createdAt)}</div>
        </div>
        <div class="meta">${t.replyCount || 0} replies</div>
      </div>`).join("");
  } catch (e) { el.innerHTML = `<div class="notice error">${e.message}</div>`; }
}

// ── Utils ─────────────────────────────────────────────────────────
function esc(str = "") {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function relTime(ts) {
  if (!ts) return "";
  const secs = Math.floor((Date.now() - (ts.seconds ? ts.seconds * 1000 : new Date(ts))) / 1000);
  if (secs < 60)   return `${secs}s ago`;
  if (secs < 3600) return `${Math.floor(secs / 60)}m ago`;
  if (secs < 86400)return `${Math.floor(secs / 3600)}h ago`;
  return `${Math.floor(secs / 86400)}d ago`;
}

function setMsg(id, msg, type = "") {
  const el = document.getElementById(id);
  if (el) { el.className = `notice${type ? " " + type : ""}`; el.textContent = msg; }
}

// Initial load
loadCategories();
